<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบวัดแววอาชีพ</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Sarabun:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --purple-soft: #ede9fe;
      --pink: #ec4899;
      --pink-light: #f9a8d4;
      --teal: #0d9488;
      --yellow: #f59e0b;
      --green: #10b981;
      --bg: #faf5ff;
      --card: #ffffff;
      --text: #1e1b4b;
      --muted: #6b7280;
      --border: #ddd6fe;
      --shadow: 0 4px 24px rgba(124, 58, 237, 0.10);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(167, 139, 250, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, rgba(236, 72, 153, 0.10) 0%, transparent 50%);
    }

    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .app-header {
      text-align: center;
      padding: 28px 0 20px;
    }

    .app-header .logo-img {
      width: 80px;
      height: auto;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .app-header .emoji-top {
      font-size: 2.4rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    .app-header h1 {
      font-family: 'Mitr', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 600;
      color: var(--purple);
      margin-top: 8px;
      line-height: 1.3;
    }

    .app-header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .progress-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 12px;
      margin: 20px 0 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      margin-bottom: 20px;
      border: 1.5px solid var(--border);
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 12px;
    }

    .card h2 {
      font-family: 'Mitr', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card .desc {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .q-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--purple-light);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .q-text {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .interest-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media(max-width:480px) {
      .interest-grid {
        grid-template-columns: 1fr;
      }
    }

    .interest-card {
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      position: relative;
    }

    .interest-card:hover {
      border-color: var(--purple-light);
      background: var(--purple-soft);
    }

    .interest-card.selected {
      border-color: var(--purple);
      background: var(--purple-soft);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .interest-card .ic-emoji {
      font-size: 1.8rem;
      margin-bottom: 6px;
      display: block;
    }

    .interest-card .ic-name {
      font-family: 'Mitr', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
    }

    .interest-card .ic-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    .interest-card .check-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      background: var(--purple);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.7rem;
    }

    .interest-card.selected .check-badge {
      display: flex;
    }

    .interest-hint {
      font-size: 0.82rem;
      color: var(--pink);
      margin-top: 10px;
      font-weight: 500;
    }

    .ab-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ab-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: #fff;
      cursor: pointer;
      text-align: left;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      transition: all 0.2s;
      line-height: 1.5;
    }

    .ab-btn:hover {
      border-color: var(--purple-light);
      background: var(--purple-soft);
    }

    .ab-btn.selected {
      border-color: var(--purple);
      background: var(--purple-soft);
    }

    .ab-btn .label-badge {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--purple-soft);
      color: var(--purple);
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
    }

    .ab-btn.selected .label-badge {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
    }

    .nav-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 14px;
      font-family: 'Mitr', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
      flex: 1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #fff;
      color: var(--purple);
      border: 2px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--purple-light);
      background: var(--purple-soft);
    }

    .btn-danger {
      background: #fff;
      color: #dc2626;
      border: 2px solid #fecaca;
      font-size: 0.85rem;
      padding: 8px 16px;
    }

    .btn-danger:hover {
      background: #fef2f2;
      border-color: #dc2626;
    }

    .info-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-family: 'Mitr', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
    }

    .form-group input,
    .form-group select {
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    .form-group input::placeholder {
      color: #c4b5fd;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 14px;
    }

    @media(max-width:480px) {

      .form-row,
      .form-row-3 {
        grid-template-columns: 1fr;
      }
    }

    .student-banner {
      background: linear-gradient(135deg, var(--purple-soft), #fce7f3);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .student-banner .stu-icon {
      font-size: 2.4rem;
      flex-shrink: 0;
    }

    .student-banner .stu-details {
      flex: 1;
    }

    .student-banner .stu-name {
      font-family: 'Mitr', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--purple);
    }

    .student-banner .stu-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .welcome-screen {
      text-align: center;
      padding: 20px 0;
    }

    .welcome-screen .big-emoji {
      font-size: 5rem;
      margin-bottom: 16px;
      animation: spin-once 1s ease;
    }

    @keyframes spin-once {
      0% {
        transform: rotate(-10deg) scale(0.8)
      }

      100% {
        transform: rotate(0deg) scale(1)
      }
    }

    .step-list {
      text-align: left;
      margin: 20px 0;
    }

    .step-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
    }

    .step-item:last-child {
      border-bottom: none;
    }

    .step-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .step-info strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .step-info span {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .info-box {
      background: linear-gradient(135deg, #ede9fe, #fce7f3);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      color: var(--purple);
      border-left: 4px solid var(--purple);
    }

    .result-header {
      text-align: center;
      padding: 20px 0 28px;
    }

    .result-header .trophy {
      font-size: 4rem;
      animation: bounce 1.5s infinite;
    }

    .result-header h2 {
      font-family: 'Mitr', sans-serif;
      font-size: 1.6rem;
      color: var(--purple);
      margin-top: 10px;
    }

    .rank-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 20px;
      border-radius: 16px;
      margin-bottom: 12px;
      border: 2px solid;
    }

    .rank-card.rank-1 {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
    }

    .rank-card.rank-2 {
      background: linear-gradient(135deg, #f0f9ff, #bae6fd);
      border-color: #38bdf8;
    }

    .rank-card.rank-3 {
      background: linear-gradient(135deg, #f0fdf4, #bbf7d0);
      border-color: #34d399;
    }

    .rank-medal {
      font-size: 2.2rem;
      flex-shrink: 0;
    }

    .rank-info {
      flex: 1;
    }

    .rank-info .rank-name {
      font-family: 'Mitr', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
    }

    .rank-info .rank-score-text {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .rank-careers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .rank-career-tag {
      background: rgba(255, 255, 255, 0.75);
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      color: #374151;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
    }

    .rank-score-badge {
      font-family: 'Mitr', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--purple);
      flex-shrink: 0;
    }

    .chart-wrap {
      position: relative;
      height: 300px;
      margin: 8px 0 16px;
    }

    .desc-box {
      background: var(--purple-soft);
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
    }

    .desc-box h3 {
      font-family: 'Mitr', sans-serif;
      font-size: 1.05rem;
      color: var(--purple);
      margin-bottom: 8px;
    }

    .desc-box p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
    }

    .career-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .career-tag {
      background: #fff;
      border: 1.5px solid var(--border);
      color: var(--purple);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.8rem;
    }

    .page {
      animation: fadeSlide 0.35s ease;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--purple-light);
      border-radius: 3px;
    }

    /* Auto-save indicator */
    .autosave-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      color: #fff;
      text-align: center;
      font-size: 0.82rem;
      padding: 6px 16px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%)
      }

      to {
        transform: translateY(0)
      }
    }

    .autosave-bar.show {
      display: block;
    }

    .resume-banner {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 2px solid #f59e0b;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .resume-banner .rb-icon {
      font-size: 2rem;
      flex-shrink: 0;
    }

    .resume-banner .rb-info {
      flex: 1;
    }

    .resume-banner .rb-title {
      font-family: 'Mitr', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #92400e;
    }

    .resume-banner .rb-sub {
      font-size: 0.82rem;
      color: #92400e;
      opacity: 0.8;
      margin-top: 2px;
    }

    .resume-banner .rb-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    /* History page */
    .history-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .history-empty .he-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .history-item {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-item:hover {
      border-color: var(--purple-light);
      box-shadow: var(--shadow);
    }

    .history-item .hi-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .history-item .hi-name {
      font-family: 'Mitr', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
    }

    .history-item .hi-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .history-item .hi-date {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .history-item .hi-top {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .history-item .hi-tag {
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .hi-tag-1 {
      background: #fef3c7;
      color: #92400e;
      border: 1.5px solid #f59e0b;
    }

    .hi-tag-2 {
      background: #f0f9ff;
      color: #0369a1;
      border: 1.5px solid #38bdf8;
    }

    .hi-tag-3 {
      background: #f0fdf4;
      color: #065f46;
      border: 1.5px solid #34d399;
    }

    .hi-delete {
      background: none;
      border: none;
      color: #dc2626;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
    }

    .hi-delete:hover {
      background: #fef2f2;
    }

    .tab-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: #fff;
      font-family: 'Mitr', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab-btn.active {
      border-color: var(--purple);
      background: var(--purple-soft);
      color: var(--purple);
      font-weight: 600;
    }

    .credits-footer {
      text-align: center;
      margin-top: 48px;
      padding: 20px 16px;
      border-top: 1.5px dashed var(--border);
    }

    .credits-footer .credits-title {
      font-family: 'Mitr', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .credits-footer .credits-names {
      font-size: 0.82rem;
      color: var(--purple);
      line-height: 1.8;
    }

    @media print {
      body {
        background: #fff;
      }

      .nav-row,
      .tab-row,
      .autosave-bar {
        display: none !important;
      }

      .app-header {
        padding: 10px 0;
      }

      .student-banner {
        border: 1.5px solid #ccc;
      }

      .credits-footer {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="autosave-bar" id="autosaveBar">💾 บันทึกอัตโนมัติแล้ว</div>
  <div class="wrapper">

    // ============================================================
    // STATE & STORAGE
    // ============================================================
    const STORAGE_KEY = 'career_assessment_v2';
    const HISTORY_KEY = 'career_assessment_history_v2';

    let state = {
      page: 'welcome',  // welcome | info | part1 | part2 | part3 | result | history
      studentInfo: { name: '', school: '', grade: '', classRoom: '', studentId: '', studentCode: '' },
      part1Answers: {},   // { groupId: true/false }
      part2Answers: {},   // { questionId: 'A'|'B' }
      part3Answers: {},   // { questionId: 'A'|'B' }
      part2Page: 0,
      part3Page: 0,
      scores: {},
      lastSaved: null,
    };

    let autosaveTimeout = null;

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        showAutosaveBar();
        state.lastSaved = new Date().toISOString();
      } catch (e) { }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const saved = JSON.parse(raw);
          if (saved && saved.page && saved.page !== 'result') {
            return saved;
          }
        }
      } catch (e) { }
      return null;
    }

    function clearCurrentProgress() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function getHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) { return []; }
    }

    function saveToHistory(result) {
      try {
        const history = getHistory();
        history.unshift({ ...result, id: Date.now() });
        // keep up to 50 entries
        if (history.length > 50) history.splice(50);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      } catch (e) { }
    }

    function deleteFromHistory(id) {
      try {
        const history = getHistory().filter(h => h.id !== id);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      } catch (e) { }
    }

    function triggerAutosave() {
      if (autosaveTimeout) clearTimeout(autosaveTimeout);
      autosaveTimeout = setTimeout(() => {
        if (state.page !== 'welcome' && state.page !== 'result' && state.page !== 'history') {
          saveState();
        }
      }, 800);
    }

    function showAutosaveBar() {
      const bar = document.getElementById('autosaveBar');
      if (!bar) return;
      bar.classList.add('show');
      setTimeout(() => bar.classList.remove('show'), 2000);
    }

    // ============================================================
    // SCORING
    // ============================================================
    function calculateScores() {
      const scores = {};
      GROUPS.forEach(g => scores[g.id] = 0);

      // Part 1: interested groups get base points
      GROUPS.forEach(g => {
        if (state.part1Answers[g.id]) scores[g.id] += 5;
      });

      // Part 2: each answer adds 1 point to the selected category
      PART2_QUESTIONS.forEach(q => {
        const ans = state.part2Answers[q.id];
        if (ans === 'A') scores[q.wA] = (scores[q.wA] || 0) + 1;
        else if (ans === 'B') scores[q.wB] = (scores[q.wB] || 0) + 1;
      });

      // Part 3: same
      PART3_QUESTIONS.forEach(q => {
        const ans = state.part3Answers[q.id];
        if (ans === 'A') scores[q.wA] = (scores[q.wA] || 0) + 1;
        else if (ans === 'B') scores[q.wB] = (scores[q.wB] || 0) + 1;
      });

      return scores;
    }

    function getRankedGroups(scores) {
      return GROUPS
        .map(g => ({ ...g, score: scores[g.id] || 0 }))
        .sort((a, b) => b.score - a.score);
    }

    // ============================================================
    const root = () => document.getElementById('app-root');

    function render() {
      const el = root();
      el.className = 'page';
      // force reflow for animation
      void el.offsetWidth;

      switch (state.page) {
        case 'welcome': renderWelcome(); break;
        case 'info': renderInfo(); break;
        case 'part1': renderPart1(); break;
        case 'part2': renderPart2(); break;
        case 'part3': renderPart3(); break;
        case 'result': renderResult(); break;
        case 'history': renderHistory(); break;
        case 'history-detail': renderHistoryDetail(); break;
        default: renderWelcome();
      }
    }

      if (savedState) {
        state = savedState;
        render();

            <div>
              <div class="hi-name">🧑‍🎓 ${h.studentInfo.name}</div>
              <div class="hi-meta">${h.studentInfo.studentCode ? 'รหัส: ' + h.studentInfo.studentCode + ' | ' : ''}${h.studentInfo.grade}/${h.studentInfo.classRoom} | เลขที่ ${h.studentInfo.studentId || '-'}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="hi-date">${formatDate(h.date)}</div>
              <button class="hi-delete" onclick="event.stopPropagation();deleteHistory(${h.id})">🗑️</button>
            </div>
          </div>
          <div class="hi-top">
            ${h.top3.map((t, i) => `<span class="hi-tag hi-tag-${i + 1}">${['🥇', '🥈', '🥉'][i]} ${t.name} (${t.score})</span>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (e) { return iso; }
    }

    function deleteHistory(id) {
      if (!confirm('ต้องการลบประวัตินี้ใช่ไหม?')) return;
      deleteFromHistory(id);
      renderHistory();
    }

    function clearAllHistory() {
      if (!confirm('ต้องการลบประวัติทั้งหมดใช่ไหม?')) return;
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }

    function viewHistoryDetail(id) {
      const history = getHistory();
      const entry = history.find(h => h.id === id);
      if (!entry) return;
      state._historyDetail = entry;
      goTo('history-detail');
    }

    function renderHistoryDetail() {
      const entry = state._historyDetail;
      if (!entry) { goTo('history'); return; }

      const medals = ['🥇', '🥈', '🥉'];
      const rankClasses = ['rank-1', 'rank-2', 'rank-3'];
      const s = entry.studentInfo;

      // Build full ranked list from scores
      const ranked = GROUPS.map(g => ({ ...g, score: entry.scores[g.id] || 0 }))
        .sort((a, b) => b.score - a.score);

      root().innerHTML = `
    <div class="student-banner">
      <div class="stu-icon">🧑‍🎓</div>
      <div class="stu-details">
        <div class="stu-name">${s.name}</div>
        <div class="stu-meta">${s.studentCode ? 'รหัส: ' + s.studentCode + ' | ' : ''}${s.grade}/${s.classRoom} | เลขที่ ${s.studentId || '-'}</div>
      </div>
    </div>
    <div class="card">
      <div class="section-badge">📋 ผลย้อนหลัง</div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:16px">ทำเมื่อ: ${formatDate(entry.date)}</div>

      <div class="result-header" style="padding-top:0">
        <div class="trophy">🏆</div>
        <h2>ผลการวัดแววอาชีพ</h2>
        <p style="color:var(--muted);margin-top:6px;font-size:0.9rem">กลุ่มอาชีพที่เหมาะกับคุณ 3 อันดับแรก</p>
      </div>

      ${ranked.slice(0, 3).map((g, i) => `
        <div class="rank-card ${rankClasses[i]}">
          <div class="rank-medal">${medals[i]}</div>
          <div class="rank-info">
            <div class="rank-name">${g.emoji} ${g.name}</div>
            <div class="rank-score-text">คะแนน: ${g.score} คะแนน</div>
            <div style="font-size:0.8rem;color:#555;margin-bottom:6px">${g.desc}</div>
            <div style="font-size:0.78rem;font-weight:600;color:#666;margin-bottom:4px">อาชีพที่เกี่ยวข้อง:</div>
            <div class="rank-careers">
              ${g.careers.map(c => `<span class="rank-career-tag">${c}</span>`).join('')}
            </div>
          </div>
          <div class="rank-score-badge">${g.score}</div>
        </div>`).join('')}

      <div style="margin-top:24px">
        <h3 style="font-family:'Mitr',sans-serif;font-size:1rem;color:var(--purple);margin-bottom:12px">📊 คะแนนทุกกลุ่มอาชีพ</h3>
        <div class="chart-wrap"><canvas id="historyChart"></canvas></div>
      </div>

      <div class="nav-row" style="flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="goTo('history')">◀ กลับประวัติ</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ พิมพ์</button>
      </div>
    </div>`;

      setTimeout(() => {
        const ctx = document.getElementById('historyChart');
        if (!ctx) return;
        const colors = ['#7c3aed', '#ec4899', '#0d9488', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ef4444', '#6366f1'];
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ranked.map(g => g.name),
            datasets: [{ data: ranked.map(g => g.score), backgroundColor: colors, borderRadius: 8, borderSkipped: false }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { color: '#ede9fe' }, ticks: { font: { family: 'Sarabun' } } },
              x: { grid: { display: false }, ticks: { font: { family: 'Sarabun', size: 11 } } }
            }
          }
        });
      }, 100);
    }

    // ============================================================
    // NAV
    // ============================================================
    function goTo(page) {
      state.page = page;
      if (page !== 'result' && page !== 'history' && page !== 'history-detail') {
        triggerAutosave();
      }
      render();
      window.scrollTo(0, 0);
    }

    function restartAll() {
      clearCurrentProgress();
      state = {
        page: 'welcome',
        studentInfo: { name: '', school: '', grade: '', classRoom: '', studentId: '', studentCode: '' },
        part1Answers: {},
        part2Answers: {},
        part3Answers: {},
        part2Page: 0,
        part3Page: 0,
        scores: {},
        lastSaved: null,
      };
      render();
    }

    // ============================================================
    // INIT
    // ============================================================
    render();
  </script>
</body>

</html>
